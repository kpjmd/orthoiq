
    <svg width="512" height="1024" viewBox="0 0 512 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6" />
          <stop offset="55%" stop-color="#1d4ed8" />
          <stop offset="100%" stop-color="#1e3a8a" />
        </linearGradient>
        <linearGradient id="beam-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#cbd5e1" />
          <stop offset="50%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#cbd5e1" />
        </linearGradient>
      </defs>

      <!-- Capsule with gradient -->
      <rect x="0" y="0" width="512" height="1024" rx="256" ry="256" fill="url(#logo-gradient)" />

      <!-- Level beam — equipoise as balance achieved -->
      <rect x="0" y="473.6" width="512" height="76.8" fill="url(#beam-gradient)" />

      <!-- Pivot circle resting on the beam -->
      <circle cx="256" cy="512" r="128" fill="white" />
    </svg>
